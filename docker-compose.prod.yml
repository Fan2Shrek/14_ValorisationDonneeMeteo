services:
  timescaledb:
    image: timescale/timescaledb:2.25.0-pg17
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - bd_net

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_net
      - bd_net

  frontend:
    build:
      context: ./frontend
      target: prod
    env_file:
      - ./.env
    restart: unless-stopped
    networks:
      - app_net

  nginx:
    image: nginx:1.29.5-alpine3.23-perl
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app_net

volumes:
  timescaledb-data:

networks:
  app_net:
  bd_net:
